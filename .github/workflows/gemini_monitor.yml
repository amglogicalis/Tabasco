name: Tabasco Resiliency Monitor

on:
  schedule:
    # Se ejecuta todos los dias a las 08:00 UTC (9:00 AM hora española)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Permite ejecutar el test manualmente desde el panel de GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Instalar Chromium de Playwright
        python -m playwright install chromium

    - name: Correr Test de Robustez de Gemini (Inline Script)
      env:
        GEMINI_SESSION_COOKIE: ${{ secrets.GEMINI_SESSION_COOKIE }}
      run: |
        python -c "
        import asyncio, os, sys, json, tempfile
        from pathlib import Path
        from playwright.async_api import async_playwright

        sys.path.insert(0, os.getcwd())
        from core.bots.gemini import GeminiBot

        async def run_test():
            print('[Monitor] Iniciando test de robustez inline de Gemini...')
            session_json = os.environ.get('GEMINI_SESSION_COOKIE')
            if not session_json:
                print('[Monitor] ERROR: Variable GEMINI_SESSION_COOKIE no configurada.')
                sys.exit(1)
                
            try:
                cookies = json.loads(session_json)
            except Exception as e:
                print(f'[Monitor] ERROR: Formato JSON de cookies invalido: {e}')
                sys.exit(1)

            temp_dir = tempfile.TemporaryDirectory()
            profile_path = Path(temp_dir.name)
            
            state_file = profile_path / 'state.json'
            state_data = {'cookies': cookies, 'origins': []}
            state_file.write_text(json.dumps(state_data), encoding='utf-8')

            bot = GeminiBot()
            bot._browser_manager = None
            
            async with async_playwright() as p:
                try:
                    context = await p.chromium.launch_persistent_context(
                        user_data_dir=str(profile_path),
                        headless=True,
                        args=['--disable-blink-features=AutomationControlled', '--no-sandbox']
                    )
                    page = context.pages[0]
                    bot._page = page
                    bot._is_ready = True
                    
                    print('[Monitor] Navegando a Gemini app...')
                    await page.goto(bot.URL, wait_until='domcontentloaded', timeout=30000)
                    await asyncio.sleep(4)
                    
                    current_url = page.url
                    print(f'[Monitor] URL tras carga: {current_url}')
                    
                    if 'google.com/sorry' in current_url:
                        print('[Monitor] ERROR: Google bloqueo la peticion (CAPTCHA).')
                        sys.exit(1)
                        
                    if 'gemini.google.com' not in current_url or 'signin' in current_url:
                        print('[Monitor] ERROR: Sesion expirada o redireccion a login.')
                        sys.exit(1)

                    test_msg = 'Hello, respond with exactly: OK_TEST'
                    print(f'[Monitor] Enviando mensaje: {test_msg!r}')
                    
                    response = await bot.send_message(test_msg)
                    print(f'[Monitor] Respuesta: {response!r}')
                    
                    if not response or not response.strip():
                        print('[Monitor] ERROR: Respuesta vacia o no pudo extraerse.')
                        sys.exit(1)
                        
                    print('[Monitor] TEST COMPLETADO CON EXITO.')
                    await context.close()
                except Exception as e:
                    print(f'[Monitor] EXCEPCION DURANTE EL TEST: {e}')
                    sys.exit(1)
                finally:
                    temp_dir.cleanup()

        asyncio.run(run_test())
        "

    - name: Enviar Correo en Caso de Fallo
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.MAIL_SERVER }}
        server_port: ${{ secrets.MAIL_PORT }}
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "🚨 ALERTA: La infraestructura de Gemini en Tabasco ha fallado"
        to: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        from: "Tabasco CI Monitor <${{ secrets.MAIL_USERNAME }}>"
        body: |
          Hola,

          El test de robustez y resiliencia de Tabasco ha detectado un fallo en la integracion con Google Gemini.
          
          Esto significa que la estructura web de Gemini ha cambiado, la sesion en la nube ha caducado, o Google ha introducido nuevas politicas de bloqueo.
          
          Por favor, revisa los logs detallados del workflow en GitHub Actions para diagnosticar el fallo:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          Atentamente,
          El Monitor de Tabasco.
