name: 🌶️ Tabasco Resiliency Monitor

on:
  schedule:
    # Se ejecuta todos los dias a las 08:00 UTC (9:00 AM hora española)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Permite ejecutar el test manualmente desde el panel de GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Instalar solo Chromium headless de Playwright
        python -m playwright install chromium

    - name: Correr Test de Robustez de Gemini
      env:
        GEMINI_SESSION_COOKIE: ${{ secrets.GEMINI_SESSION_COOKIE }}
      run: |
        python scripts/run_monitor_test.py

    - name: Enviar Correo en Caso de Fallo
      if: failure()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.MAIL_SERVER }}
        server_port: ${{ secrets.MAIL_PORT }}
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "🚨 ALERTA: La infraestructura de Gemini en Tabasco ha fallado"
        to: ${{ secrets.ALERT_RECIPIENT_EMAIL }}
        from: "Tabasco CI Monitor <${{ secrets.MAIL_USERNAME }}>"
        body: |
          Hola,

          El test de robustez y resiliencia de Tabasco ha detectado un fallo en la integracion con Google Gemini.
          
          Esto significa que la estructura web de Gemini ha cambiado, la sesion en la nube ha caducado, o Google ha introducido nuevas politicas de bloqueo.
          
          Por favor, revisa los logs detallados del workflow en GitHub Actions para diagnosticar el fallo:
          https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          
          Atentamente,
          El Monitor de Tabasco.
